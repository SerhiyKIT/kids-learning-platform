# Kids Learning Platform — Full Stack Docker Compose
# Usage:
#   docker compose up -d                  # start everything
#   docker compose logs -f gateway        # stream gateway logs
#   docker compose down -v                # stop and remove volumes
#
# Pre-requisites:
#   1. Build JAR files first (run once, then only when code changes):
#      ./build-all.sh
#   2. Set GEMINI_API_KEY env var (optional, fallback hints work without it):
#      export GEMINI_API_KEY=your_key

name: kids-learning-platform

# ─── Shared network ──────────────────────────────────────────────────────────
networks:
  platform:
    driver: bridge

# ─── Named volumes for data persistence ──────────────────────────────────────
volumes:
  postgres-gateway:
  postgres-learning:
  mongodb-ai:
  keycloak-data:

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── 1. Keycloak (OAuth2 / OIDC) ───────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.3
    command: "start-dev --import-realm"
    container_name: kl-keycloak
    networks:
      - platform
    volumes:
      - ./gateway/src/main/docker/realm-config:/opt/keycloak/data/import
      - ./gateway/src/main/docker/realm-config/keycloak-health-check.sh:/opt/keycloak/health-check.sh
      - keycloak-data:/opt/keycloak/data
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_FEATURES: scripts
      KC_HTTP_PORT: "9080"
      KC_HTTPS_PORT: "9443"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_MANAGEMENT_PORT: "9990"
    ports:
      - "9080:9080"
      - "9443:9443"
    healthcheck:
      test: "bash /opt/keycloak/health-check.sh"
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 20s

  # ── 2. JHipster Registry (Eureka + Config server) ─────────────────────────
  jhipster-registry:
    image: jhipster/jhipster-registry:latest
    container_name: kl-registry
    networks:
      - platform
    volumes:
      - ./gateway/src/main/docker/central-server-config:/central-config
    environment:
      _JAVA_OPTIONS: "-Xmx512m -Xms256m"
      SPRING_PROFILES_ACTIVE: "dev,api-docs"
      SPRING_SECURITY_USER_PASSWORD: "admin"
      JHIPSTER_REGISTRY_PASSWORD: "admin"
      SPRING_CLOUD_CONFIG_SERVER_COMPOSITE_0_TYPE: "native"
      SPRING_CLOUD_CONFIG_SERVER_COMPOSITE_0_SEARCH_LOCATIONS: "file:./central-config/localhost-config/"
      SERVER_PORT: "8761"
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_SECRET: "MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5"
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET: "MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5MmYzaNG5"
    ports:
      - "8761:8761"
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/management/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── 3. PostgreSQL for gateway ──────────────────────────────────────────────
  postgres-gateway:
    image: postgres:17.4
    container_name: kl-postgres-gateway
    networks:
      - platform
    environment:
      POSTGRES_USER: gateway
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-gateway:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 4. PostgreSQL for learningService ─────────────────────────────────────
  postgres-learning:
    image: postgres:17.4
    container_name: kl-postgres-learning
    networks:
      - platform
    environment:
      POSTGRES_USER: learningService
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-learning:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learningService"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 5. MongoDB for aiContentService ───────────────────────────────────────
  mongodb:
    image: mongo:8.0.9
    container_name: kl-mongodb
    networks:
      - platform
    volumes:
      - mongodb-ai:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── 6. Gateway (Spring Boot, port 8080) ───────────────────────────────────
  gateway:
    image: gateway:latest
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: kl-gateway
    networks:
      - platform
    environment:
      _JAVA_OPTIONS: "-Xmx512m -Xms256m"
      SPRING_PROFILES_ACTIVE: "prod,api-docs"
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "http://admin:admin@jhipster-registry:8761/eureka"
      SPRING_CLOUD_CONFIG_URI: "http://admin:admin@jhipster-registry:8761/config"
      SPRING_R2DBC_URL: "r2dbc:postgresql://postgres-gateway:5432/gateway"
      SPRING_LIQUIBASE_URL: "jdbc:postgresql://postgres-gateway:5432/gateway"
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_OIDC_ISSUER_URI: "http://keycloak:9080/realms/jhipster"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_ID: "web_app"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_SECRET: "web_app"
    ports:
      - "8080:8080"
    depends_on:
      postgres-gateway:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      jhipster-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/management/health"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s

  # ── 7. Learning Service (Spring Boot, port 8081) ───────────────────────────
  learning-service:
    image: learning-service:latest
    build:
      context: ./learningService
      dockerfile: Dockerfile
    container_name: kl-learning
    networks:
      - platform
    environment:
      _JAVA_OPTIONS: "-Xmx512m -Xms256m"
      SPRING_PROFILES_ACTIVE: "prod,api-docs"
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "http://admin:admin@jhipster-registry:8761/eureka"
      SPRING_CLOUD_CONFIG_URI: "http://admin:admin@jhipster-registry:8761/config"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-learning:5432/learningService"
      SPRING_LIQUIBASE_URL: "jdbc:postgresql://postgres-learning:5432/learningService"
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_OIDC_ISSUER_URI: "http://keycloak:9080/realms/jhipster"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_ID: "internal"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_SECRET: "internal"
    depends_on:
      postgres-learning:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      jhipster-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/management/health"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s

  # ── 8. AI Content Service (Spring Boot, port 8082) ────────────────────────
  ai-content-service:
    image: ai-content-service:latest
    build:
      context: ./aiContentService
      dockerfile: Dockerfile
    container_name: kl-ai
    networks:
      - platform
    environment:
      _JAVA_OPTIONS: "-Xmx512m -Xms256m"
      SPRING_PROFILES_ACTIVE: "prod,api-docs"
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "http://admin:admin@jhipster-registry:8761/eureka"
      SPRING_CLOUD_CONFIG_URI: "http://admin:admin@jhipster-registry:8761/config"
      SPRING_DATA_MONGODB_URI: "mongodb://mongodb:27017/aiContentService"
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_OIDC_ISSUER_URI: "http://keycloak:9080/realms/jhipster"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_ID: "internal"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_SECRET: "internal"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      jhipster-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/management/health"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s
