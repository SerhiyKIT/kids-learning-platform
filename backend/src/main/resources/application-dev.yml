spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:kidlearn}
    username: ${POSTGRES_USER:kidlearn}
    password: ${POSTGRES_PASSWORD:kidlearn}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}

# Local MinIO instance started via /infra/docker-compose.yml.
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: ${MINIO_BUCKET:kidlearn-assets}
