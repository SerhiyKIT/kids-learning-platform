spring:
  application:
    name: backend
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    # Mail isn't wired up yet (starter is present for later use); don't let
    # its health check drag down /actuator/health until it's actually used.
    mail:
      enabled: false
