spring:
  application:
    name: backend
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    # Mail sending is fire-and-forget (see AuthMailSender); a transient SMTP
    # outage shouldn't flip the whole app's health to DOWN.
    mail:
      enabled: false

auth:
  email-verification-ttl: 24h
  password-reset-ttl: 1h
